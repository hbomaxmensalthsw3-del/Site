<!DOCTYPE html>
<html>
<body>
<h2>Dashboard LJH</h2>

<h3>Gerar Keys</h3>
<input id="amount" placeholder="quantidade">
<input id="time" placeholder="tempo min">
<button onclick="generate()">Gerar</button>

<h3>Keys</h3>
<div id="keys"></div>

<script>
async function load(){
  const r = await fetch("/keys");
  const data = await r.json();

  keys.innerHTML = data.map(k=>`
    <div>
      <b>${k.key}</b> - ${k.status}
      <button onclick="copy('${k.key}')">Copy</button>
      <button onclick="del('${k.key}')">Del</button>
    </div>
  `).join("");
}

async function generate(){
  await fetch("/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      amount:Number(amount.value),
      time:Number(time.value)
    })
  });
  load();
}

async function del(key){
  await fetch("/keys/delete",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({key})
  });
  load();
}

function copy(k){
  navigator.clipboard.writeText(k);
  alert("copiado");
}

load();
</script>

</body>
</html>
